name: Build NEW YOU APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Override app icons
        run: |
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${dir}
            cp ic_launcher.png android/app/src/main/res/mipmap-${dir}/ic_launcher.png
            cp ic_launcher.png android/app/src/main/res/mipmap-${dir}/ic_launcher_round.png
            cp ic_launcher_adaptive_back.png android/app/src/main/res/mipmap-${dir}/ic_launcher_adaptive_back.png
            cp ic_launcher_adaptive_fore.png android/app/src/main/res/mipmap-${dir}/ic_launcher_adaptive_fore.png
          done
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Set app name to NEW YOU
        run: |
          sed -i 's/android:label="[^"]*"/android:label="NEW YOU"/g' \
            android/app/src/main/AndroidManifest.xml

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          find android/app/build/outputs/apk/debug/ -name "*.apk" -exec mv {} android/app/build/outputs/apk/debug/newyou.apk \;
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewYou-APK
          path: android/app/build/outputs/apk/debug/newyou.apk
          retention-days: 30
